<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>AI Autocomplete</h1>

  <label for="provider">Provider</label>
  <select id="provider">
    <option value="openai">OpenAI</option>
    <option value="anthropic">Anthropic</option>
    <option value="gemini">Google Gemini</option>
  </select>

  <label for="model">Model</label>
  <input id="model" type="text" placeholder="gpt-4o-mini" />

  <label for="apiKey">API Key</label>
  <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

  <label for="maxTokens">Max suggestion length (tokens)</label>
  <input id="maxTokens" type="number" min="5" max="200" />

  <button id="save">Save</button>
  <p id="status"></p>

  <p class="hint">Your key is stored locally via <code>chrome.storage.sync</code> and is only sent to the provider's API.</p>

  <script src="popup.js"></script>
</body>
</html>
